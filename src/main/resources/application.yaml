server:
  port: 8080
  servlet:
    context-path: /api-access-management
spring:
  application:
    name: UserAccessManagement
  datasource:
    url: jdbc:postgresql://localhost:5432/uam_db?currentSchema=prod
    driver-class-name: org.postgresql.Driver
    username: user
    password: root
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG